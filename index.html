<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meu Organizador">
<meta name="theme-color" content="#4f98a3">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Meu Organizador</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f6f2;--surf:#f9f8f5;--surf2:#fbfbf9;--off:#f0ede9;
  --brd:#d4d1ca;--div:#dcd9d5;
  --txt:#28251d;--muted:#7a7974;--faint:#bab9b4;
  --pri:#01696f;--pri-h:#0c4e54;
  --err:#a12c7b;--ok:#437a22;--warn:#964219;
  --rx:0.75rem;--rl:0.5rem;--rs:0.375rem;
  --s1:0.25rem;--s2:0.5rem;--s3:0.75rem;--s4:1rem;
  --s5:1.25rem;--s6:1.5rem;--s8:2rem;--s10:2.5rem;--s12:3rem;
  --xs:0.75rem;--sm:0.875rem;--base:1rem;--lg:1.125rem;--xl:1.5rem;
  --font:'Satoshi',system-ui,sans-serif;
  --trans:180ms cubic-bezier(.16,1,.3,1);
  --sh:0 2px 8px rgba(0,0,0,.08);--sh-lg:0 8px 24px rgba(0,0,0,.12);
  --topbar-h:56px;--mobnav-h:64px;
}
[data-theme="dark"]{
  --bg:#171614;--surf:#1c1b19;--surf2:#201f1d;--off:#22211f;
  --brd:#393836;--div:#262523;
  --txt:#cdccca;--muted:#797876;--faint:#5a5957;
  --pri:#4f98a3;--pri-h:#227f8b;
  --err:#d163a7;--ok:#6daa45;--warn:#bb653b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:none;text-size-adjust:none;-webkit-font-smoothing:antialiased;scroll-behavior:smooth;overscroll-behavior:none}
body{font-family:var(--font);font-size:var(--base);color:var(--txt);background:var(--bg);min-height:100dvh;overscroll-behavior:none;-webkit-overflow-scrolling:touch}
img,svg{display:block;max-width:100%}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
input,select,textarea{font:inherit;color:inherit}
a,button,[role=button]{transition:color var(--trans),background var(--trans),border-color var(--trans),box-shadow var(--trans)}
:focus-visible{outline:2px solid var(--pri);outline-offset:3px;border-radius:var(--rs)}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;min-height:100dvh}

/* Topbar */
#topbar{
  position:sticky;top:0;z-index:100;
  height:var(--topbar-h);
  background:var(--surf);border-bottom:1px solid var(--div);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--s4);
  padding-top:env(safe-area-inset-top,0px);
  height:calc(var(--topbar-h) + env(safe-area-inset-top,0px));
}
#topbar .logo{display:flex;align-items:center;gap:var(--s2);font-weight:700;font-size:var(--lg);color:var(--pri)}
#topbar .logo svg{flex-shrink:0}
#topbar .top-actions{display:flex;gap:var(--s2);align-items:center}

/* Main content */
#main{
  flex:1;
  padding:var(--s4);
  padding-bottom:calc(var(--mobnav-h) + var(--s4) + env(safe-area-inset-bottom,0px));
  max-width:640px;width:100%;margin:0 auto;
}

/* Bottom nav */
#mobnav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:calc(var(--mobnav-h) + env(safe-area-inset-bottom,0px));
  background:var(--surf);border-top:1px solid var(--div);
  display:flex;align-items:flex-start;padding-top:var(--s2);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.mnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:var(--xs);color:var(--muted);padding:var(--s1) 0;
  border-radius:var(--rs);transition:color var(--trans);
  min-height:44px;
}
.mnav-btn.active{color:var(--pri)}
.mnav-btn svg{stroke:currentColor}

/* Views */
.view{display:none}.view.active{display:block}

/* Cards */
.card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rx);padding:var(--s6);margin-bottom:var(--s4)}
.card-sm{padding:var(--s4);border-radius:var(--rl)}
.card-title{font-size:var(--xs);font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:var(--s4)}
.section-title{font-size:var(--lg);font-weight:700;margin-bottom:var(--s4)}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--s3);margin-bottom:var(--s4)}
.kpi{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rx);padding:var(--s4)}
.kpi-label{font-size:var(--xs);color:var(--muted);margin-bottom:var(--s1)}
.kpi-val{font-size:var(--xl);font-weight:700;font-variant-numeric:tabular-nums;line-height:1.2}
.kpi-val.ok{color:var(--ok)}.kpi-val.err{color:var(--err)}.kpi-val.pri{color:var(--pri)}

/* Month nav */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--s4);background:var(--surf);border:1px solid var(--brd);border-radius:var(--rx);padding:var(--s3) var(--s4)}
.month-nav button{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--rs);color:var(--muted)}
.month-nav button:hover{background:var(--off);color:var(--txt)}
.month-label{font-weight:600;font-size:var(--base)}

/* Forms */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--s3)}
.form-field{display:flex;flex-direction:column;gap:var(--s1)}
.form-field.full{grid-column:1/-1}
.form-field label{font-size:var(--xs);font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.form-field input,.form-field select,.form-field textarea{
  background:var(--surf);border:1px solid var(--brd);border-radius:var(--rl);
  padding:var(--s3) var(--s4);font-size:var(--base);
  transition:border-color var(--trans),box-shadow var(--trans);
}
.form-field input:focus,.form-field select:focus{border-color:var(--pri);box-shadow:0 0 0 3px color-mix(in oklch,var(--pri) 15%,transparent);outline:none}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:var(--s2);padding:var(--s3) var(--s5);border-radius:var(--rl);font-size:var(--sm);font-weight:600;transition:background var(--trans),color var(--trans),box-shadow var(--trans)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--pri);color:#fff}
.btn-primary:hover{background:var(--pri-h)}
.btn-ghost{background:transparent;border:1px solid var(--brd);color:var(--txt)}
.btn-ghost:hover{background:var(--off)}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:var(--s1) var(--s3);font-size:var(--xs)}

/* Type toggle */
.type-toggle{display:flex;gap:var(--s2);margin-bottom:var(--s4)}
.type-btn{flex:1;padding:var(--s3);border-radius:var(--rl);border:2px solid var(--brd);font-weight:600;font-size:var(--sm);color:var(--muted);background:transparent;transition:all var(--trans)}
.type-btn.active-rec{border-color:var(--ok);color:var(--ok);background:color-mix(in oklch,var(--ok) 10%,transparent)}
.type-btn.active-desp{border-color:var(--err);color:var(--err);background:color-mix(in oklch,var(--err) 10%,transparent)}

/* Transactions list */
.tx-item{display:flex;align-items:center;gap:var(--s3);padding:var(--s3) 0;border-bottom:1px solid var(--div)}
.tx-item:last-child{border-bottom:none}
.tx-icon{width:38px;height:38px;border-radius:var(--rx);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-desc{font-size:var(--sm);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:var(--xs);color:var(--muted)}
.tx-val{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.tx-val.desp{color:var(--err)}.tx-val.rec{color:var(--ok)}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:var(--xs);font-weight:600}
.badge-green{background:color-mix(in oklch,var(--ok) 15%,transparent);color:var(--ok)}
.badge-red{background:color-mix(in oklch,var(--err) 15%,transparent);color:var(--err)}
.badge-blue{background:color-mix(in oklch,var(--pri) 15%,transparent);color:var(--pri)}

/* Budget bars */
.budget-bar{height:8px;background:var(--off);border-radius:99px;overflow:hidden;margin:var(--s2) 0}
.budget-fill{height:100%;border-radius:99px;transition:width .5s ease}

/* Voice */
.voice-box{background:var(--off);border:1px solid var(--brd);border-radius:var(--rx);padding:var(--s4);margin-bottom:var(--s4);display:flex;align-items:center;gap:var(--s3);color:var(--muted);font-size:var(--sm)}
.voice-box.listening{border-color:var(--pri);background:color-mix(in oklch,var(--pri) 8%,transparent)}
#voice-btn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--surf);border:1px solid var(--brd)}
#voice-btn:hover{background:var(--off)}
#voice-btn.listening{background:var(--pri);color:#fff;border-color:var(--pri)}
.voice-dots{display:flex;gap:4px;align-items:center}
.voice-dots span{width:6px;height:6px;border-radius:50%;background:var(--pri);animation:vdot 1.2s ease-in-out infinite}
.voice-dots span:nth-child(2){animation-delay:.2s}
.voice-dots span:nth-child(3){animation-delay:.4s}
@keyframes vdot{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2)}}

/* Recurring */
.rec-row{display:flex;align-items:center;gap:var(--s3);padding:var(--s3) var(--s4);background:var(--surf);border:1px solid var(--brd);border-radius:var(--rl);margin-bottom:var(--s2)}
.rec-day{font-size:var(--xs);font-weight:700;color:var(--pri);min-width:36px}

/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--s3);padding:var(--s12) var(--s6);color:var(--muted);text-align:center}
.empty svg{color:var(--faint)}

/* Toast */
#toast-area{position:fixed;top:var(--s4);right:var(--s4);z-index:9999;display:flex;flex-direction:column;gap:var(--s2);pointer-events:none}
.toast{background:var(--txt);color:var(--bg);padding:var(--s3) var(--s5);border-radius:var(--rl);font-size:var(--sm);font-weight:500;box-shadow:var(--sh-lg);animation:toastin .25s ease;max-width:280px}
.toast.err{background:var(--err)}
@keyframes toastin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

/* Splash */
#splash{position:fixed;inset:0;z-index:99999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--s4);transition:opacity .4s ease}
#splash.hide{opacity:0;pointer-events:none}
#splash svg{animation:splpulse 1.4s ease-in-out infinite}
#splash .spl-name{font-size:var(--xl);font-weight:700;color:var(--pri)}
#splash .spl-sub{font-size:var(--sm);color:var(--muted)}
@keyframes splpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

/* Dark toggle */
#theme-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--rs);color:var(--muted)}
#theme-btn:hover{background:var(--off)}

/* Tabs de lançamentos */
.sub-tabs{display:flex;gap:var(--s2);margin-bottom:var(--s4)}
.sub-tab{flex:1;padding:var(--s2) var(--s3);border-radius:var(--rl);border:1px solid var(--brd);font-size:var(--sm);font-weight:600;color:var(--muted);text-align:center}
.sub-tab.active{background:var(--pri);color:#fff;border-color:var(--pri)}

/* Swipe delete hint */
.del-btn{background:none;border:none;color:var(--faint);padding:var(--s1);border-radius:var(--rs);font-size:1rem;line-height:1;min-width:28px;min-height:28px}
.del-btn:hover{color:var(--err)}

/* Repeat badge */
.repeat-info{font-size:var(--xs);color:var(--pri);background:color-mix(in oklch,var(--pri) 10%,transparent);padding:1px 6px;border-radius:99px;margin-left:var(--s1)}

/* Chart placeholder */
.chart-wrap{position:relative;height:200px;margin:var(--s4) 0}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--div);border-radius:99px}

/* Utility */
.row{display:flex;align-items:center;gap:var(--s3)}
.row-sb{display:flex;align-items:center;justify-content:space-between}
.mt2{margin-top:var(--s2)}.mt4{margin-top:var(--s4)}.mt6{margin-top:var(--s6)}
.text-muted{color:var(--muted)}.text-sm{font-size:var(--sm)}.text-xs{font-size:var(--xs)}
.fw7{font-weight:700}.tabnum{font-variant-numeric:tabular-nums}
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
    <rect width="72" height="72" rx="18" fill="color-mix(in oklch,var(--pri) 15%,var(--surf))"/>
    <path d="M16 52 L28 38 L40 45 L52 26 L58 20" stroke="var(--pri)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="58" cy="20" r="5" fill="var(--pri)"/>
  </svg>
  <span class="spl-name">Meu Organizador</span>
  <span class="spl-sub">Carregando...</span>
</div>

<div id="toast-area"></div>

<div id="app">
  <!-- TOPBAR -->
  <header id="topbar">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="var(--pri)"/>
        <path d="M6 20 L11 14 L16 17 L21 9 L24 6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="page-title">Dashboard</span>
    </div>
    <div class="top-actions">
      <div id="month-display" style="font-size:var(--xs);color:var(--muted);font-weight:600"></div>
      <button id="theme-btn" title="Alternar tema" onclick="toggleTheme()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main id="main">

    <!-- ── DASHBOARD ── -->
    <div id="view-dashboard" class="view active">
      <div class="month-nav">
        <button onclick="changeMonth(-1)" title="Mês anterior">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="month-label" id="month-label"></span>
        <button onclick="changeMonth(1)" title="Próximo mês">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-label">Saldo</div><div class="kpi-val pri tabnum" id="kpi-saldo">R$ 0</div></div>
        <div class="kpi"><div class="kpi-label">Receitas</div><div class="kpi-val ok tabnum" id="kpi-rec">R$ 0</div></div>
        <div class="kpi"><div class="kpi-label">Despesas</div><div class="kpi-val err tabnum" id="kpi-desp">R$ 0</div></div>
        <div class="kpi"><div class="kpi-label">Economia</div><div class="kpi-val tabnum" id="kpi-eco">0%</div></div>
      </div>
      <div class="card">
        <div class="card-title">Gastos por Categoria</div>
        <div id="dash-cats"></div>
      </div>
      <div class="card">
        <div class="card-title">Últimos Lançamentos</div>
        <div id="dash-recent"></div>
      </div>
    </div>

    <!-- ── LANÇAMENTOS ── -->
    <div id="view-lancamentos" class="view">
      <div class="sub-tabs">
        <button class="sub-tab active" id="tab-nova" onclick="switchSubTab('nova')">Nova</button>
        <button class="sub-tab" id="tab-lista" onclick="switchSubTab('lista')">Histórico</button>
      </div>

      <!-- Nova transação -->
      <div id="sub-nova">
        <!-- Voz -->
        <div class="voice-box" id="voice-box">
          <button id="voice-btn" onclick="toggleVoice()" title="Falar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
          </button>
          <span id="voice-display">Toque no microfone ou preencha abaixo...</span>
        </div>
        <div class="form-field full" style="margin-bottom:var(--s3)">
          <label>Descreva o lançamento em texto livre</label>
          <div style="display:flex;gap:var(--s2)">
            <input type="text" id="txt-input" placeholder='Ex: "gastei 50 no cartão no bar da esquina"' style="flex:1">
            <button class="btn btn-ghost" onclick="processNLP()" style="white-space:nowrap">Analisar</button>
          </div>
        </div>
        <div class="type-toggle">
          <button class="type-btn active-desp" id="btn-desp" onclick="setType('despesa')">⬆ Despesa</button>
          <button class="type-btn" id="btn-rec" onclick="setType('receita')">⬇ Receita</button>
        </div>
        <div class="form-grid">
          <div class="form-field full">
            <label>Descrição</label>
            <input type="text" id="f-desc" placeholder="Ex: Almoço, Salário...">
          </div>
          <div class="form-field">
            <label>Valor (R$)</label>
            <input type="number" id="f-valor" placeholder="0,00" min="0" step="0.01">
          </div>
          <div class="form-field">
            <label>Data</label>
            <input type="date" id="f-data">
          </div>
          <div class="form-field">
            <label>Categoria</label>
            <select id="f-cat">
              <option value="alimentacao">🍽 Alimentação</option>
              <option value="transporte">🚗 Transporte</option>
              <option value="moradia">🏠 Moradia</option>
              <option value="saude">💊 Saúde</option>
              <option value="educacao">📚 Educação</option>
              <option value="lazer">🎮 Lazer</option>
              <option value="roupas">👕 Roupas</option>
              <option value="salario">💰 Salário</option>
              <option value="freelance">💼 Freelance</option>
              <option value="outros">📦 Outros</option>
            </select>
          </div>
          <div class="form-field">
            <label>Conta</label>
            <select id="f-conta">
              <option value="corrente">Conta Corrente</option>
              <option value="poupanca">Poupança</option>
              <option value="cartao">Cartão de Crédito</option>
              <option value="dinheiro">Dinheiro</option>
            </select>
          </div>
          <div class="form-field">
            <label>Repetição</label>
            <select id="f-repeat" onchange="toggleRepeatCount()">
              <option value="none">Sem repetição</option>
              <option value="weekly">Semanal</option>
              <option value="monthly">Mensal</option>
              <option value="yearly">Anual</option>
            </select>
          </div>
          <div class="form-field" id="f-repeat-count-wrap" style="display:none">
            <label>Quantas vezes</label>
            <input type="number" id="f-repeat-count" placeholder="Ex: 12" min="2" max="120" value="2">
          </div>
        </div>
        <div class="row mt4" style="gap:var(--s3)">
          <button class="btn btn-ghost" onclick="clearForm()" style="flex:1">Limpar</button>
          <button class="btn btn-primary" onclick="addTransaction()" style="flex:2">Salvar Lançamento</button>
        </div>
      </div>

      <!-- Lista -->
      <div id="sub-lista" style="display:none">
        <div class="row-sb" style="margin-bottom:var(--s3)">
          <input type="text" id="search-input" placeholder="Buscar..." style="flex:1;padding:var(--s2) var(--s3);border:1px solid var(--brd);border-radius:var(--rl);background:var(--surf);font-size:var(--sm)" oninput="renderLista()">
          <select id="filter-cat" style="margin-left:var(--s2);padding:var(--s2) var(--s3);border:1px solid var(--brd);border-radius:var(--rl);background:var(--surf);font-size:var(--sm)" onchange="renderLista()">
            <option value="">Todas</option>
            <option value="alimentacao">Alimentação</option>
            <option value="transporte">Transporte</option>
            <option value="moradia">Moradia</option>
            <option value="saude">Saúde</option>
            <option value="educacao">Educação</option>
            <option value="lazer">Lazer</option>
            <option value="roupas">Roupas</option>
            <option value="salario">Salário</option>
            <option value="freelance">Freelance</option>
            <option value="outros">Outros</option>
          </select>
        </div>
        <div id="tx-list"></div>
      </div>
    </div>

    <!-- ── ORÇAMENTO ── -->
    <div id="view-orcamento" class="view">

function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('MeuOrganizadorDB',2);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('transactions')) d.createObjectStore('transactions',{keyPath:'id'});
      if(!d.objectStoreNames.contains('recurring'))    d.createObjectStore('recurring',{keyPath:'id'});
      if(!d.objectStoreNames.contains('budgets'))      d.createObjectStore('budgets',{keyPath:'id'});
    };
    r.onsuccess=e=>{db=e.target.result;res(db)};
    r.onerror=e=>rej(e);
  });
}
function dbGetAll(store){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readonly');
    const req=tx.objectStore(store).getAll();
    req.onsuccess=()=>res(req.result);
    req.onerror=e=>rej(e);
  });
}
function dbPut(store,obj){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readwrite');
    const req=tx.objectStore(store).put(obj);
    req.onsuccess=()=>res();
    req.onerror=e=>rej(e);
  });
}
function dbDelete(store,id){
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,'readwrite');
    const req=tx.objectStore(store).delete(id);
    req.onsuccess=()=>res();
    req.onerror=e=>rej(e);
  });
}

// ── NLP ───────────────────────────────────────────────────────────────────────
const STOPWORDS=new Set(['o','a','os','as','um','uma','uns','umas','de','do','da','dos','das','em','no','na','nos','nas','por','para','com','ao','à','aos','às','e','é','que','se','isso','ele','ela','eu','meu','minha','paguei','gastei','comprei','recebi','ganhei','transferi','foi','hoje','ontem','dia','mês','mes','semana','valor','reais','real','r$','rs','brl','pra','num','numa']);
const TYPE_KEYS={gastei:'despesa',paguei:'despesa',comprei:'despesa',debitei:'despesa',saiu:'despesa',usei:'despesa',recebi:'receita',ganhei:'receita',entrou:'receita',depositei:'receita',caiu:'receita'};
const CONTA_KEYS={cartao:'cartao','cartão':'cartao',credito:'cartao','crédito':'cartao',debito:'corrente','débito':'corrente',pix:'corrente',corrente:'corrente',banco:'corrente',transferencia:'corrente','transferência':'corrente',poupanca:'poupanca','poupança':'poupanca',dinheiro:'dinheiro',especie:'dinheiro','espécie':'dinheiro',cash:'dinheiro',boleto:'corrente',ted:'corrente'};
const CAT_KEYS={mercado:'alimentacao',supermercado:'alimentacao',hortifruti:'alimentacao',padaria:'alimentacao','açougue':'alimentacao',acougue:'alimentacao','almoço':'alimentacao',almoco:'alimentacao',jantar:'alimentacao','café':'alimentacao',cafe:'alimentacao',lanche:'alimentacao',pizza:'alimentacao',hamburguer:'alimentacao',hamburger:'alimentacao',restaurante:'alimentacao',comida:'alimentacao','refeição':'alimentacao',refeicao:'alimentacao',delivery:'alimentacao',ifood:'alimentacao',rappi:'alimentacao',sushi:'alimentacao',churrasco:'alimentacao',feira:'alimentacao',snack:'alimentacao',bar:'alimentacao',boteco:'alimentacao',botequim:'alimentacao','bistrô':'alimentacao',bistro:'alimentacao',cantina:'alimentacao',lanchonete:'alimentacao',uber:'transporte','99':'transporte',taxi:'transporte','táxi':'transporte',gasolina:'transporte',combustivel:'transporte','combustível':'transporte',etanol:'transporte',diesel:'transporte',posto:'transporte','ônibus':'transporte',onibus:'transporte','metrô':'transporte',metro:'transporte',trem:'transporte',estacionamento:'transporte','pedágio':'transporte',pedagio:'transporte',aluguel:'moradia','condomínio':'moradia',condominio:'moradia',iptu:'moradia',luz:'moradia',energia:'moradia','água':'moradia',agua:'moradia','gás':'moradia',gas:'moradia',internet:'moradia',telefone:'moradia',celular:'moradia',net:'moradia',claro:'moradia',vivo:'moradia',tim:'moradia','farmácia':'saude',farmacia:'saude','remédio':'saude',remedio:'saude','médico':'saude',medico:'saude',consulta:'saude',dentista:'saude',exame:'saude',hospital:'saude','clínica':'saude',clinica:'saude',academia:'saude',unimed:'saude',sulamerica:'saude',amil:'saude','psicólogo':'saude',psicologo:'saude',terapia:'saude',fisioterapia:'saude',faculdade:'educacao',escola:'educacao',curso:'educacao',livro:'educacao',material:'educacao',mensalidade:'educacao',udemy:'educacao',alura:'educacao',coursera:'educacao',roupa:'roupas',roupas:'roupas',camisa:'roupas','calça':'roupas',calca:'roupas','tênis':'roupas',tenis:'roupas',sapato:'roupas',vestido:'roupas',camiseta:'roupas',jaqueta:'roupas',casaco:'roupas',lazer:'lazer','diversão':'lazer',diversao:'lazer',cinema:'lazer',teatro:'lazer',show:'lazer',festa:'lazer',balada:'lazer',clube:'lazer',netflix:'lazer',spotify:'lazer',disney:'lazer',streaming:'lazer',jogo:'lazer',game:'lazer',viagem:'lazer',hotel:'lazer',passeio:'lazer',ingresso:'lazer',parque:'lazer','salário':'salario',salario:'salario',holerite:'salario',freelance:'freelance',freela:'freelance',projeto:'freelance',consultoria:'freelance','honorários':'freelance',honorarios:'freelance',dividendos:'freelance'};

function parseNLP(text){
  const raw=text.toLowerCase().trim();
  const words=raw.split(/\s+/);
  // tipo
  let type='despesa';
  for(const w of words){if(TYPE_KEYS[w]){type=TYPE_KEYS[w];break;}}
  // valor
  const nm=raw.match(/\b\d{1,3}(?:[.,]\d{3})*(?:[.,]\d{1,2})?\b|\b\d+\b/);
  const amount=nm?parseFloat(nm[0].replace(/\./g,'').replace(',','.')):0;
  // data
  const today=new Date();
  let date=today.toISOString().split('T')[0];
  if(raw.includes('ontem')){const d=new Date(today);d.setDate(d.getDate()-1);date=d.toISOString().split('T')[0];}
  // conta — varredura completa
  let account='corrente';
  outer: for(let i=0;i<words.length-1;i++){const bg=words[i]+' '+words[i+1];if(CONTA_KEYS[bg]){account=CONTA_KEYS[bg];break outer;}}
  if(account==='corrente'){for(const w of words){if(CONTA_KEYS[w]){account=CONTA_KEYS[w];break;}}}
  // categoria — bigramas depois unigrams depois substring
  let category=type==='receita'?'salario':'outros';
  outer2: for(let i=0;i<words.length-1;i++){const bg=words[i]+' '+words[i+1];if(CAT_KEYS[bg]){category=CAT_KEYS[bg];break outer2;}}
  if(category==='outros'||category==='salario'){for(const w of words){if(CAT_KEYS[w]){category=CAT_KEYS[w];break;}}}
  if(category==='outros'){for(const[k,v] of Object.entries(CAT_KEYS)){if(raw.includes(k)){category=v;break;}}}
  // descrição via preposição de lugar
  let description='';
  const pm=raw.match(/\b(?:no|na|em|do|da|num|numa|pelo|pela)\s+([a-záàãâéêíóôúç][a-záàãâéêíóôúç\s]{1,25}?)(?:\s+(?:hoje|ontem|dia|\d|no|na|em|de|com)|$)/i);
  if(pm) description=pm[1].trim();
  if(!description){
    const ignore=new Set([...STOPWORDS,...Object.keys(TYPE_KEYS),...Object.keys(CONTA_KEYS),'dia','hoje','ontem','semana','mês','mes']);
    const dw=[];
    for(const w of words){if(ignore.has(w)||/^\d+([.,]\d+)?$/.test(w))continue;dw.push(w);if(dw.length>=3)break;}
    description=dw.map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
  } else {
    description=description.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
  }
  return{type,amount,description:description||'Lançamento',category,date,account};
}

function processNLP(){
  const txt=document.getElementById('txt-input').value.trim();
  if(!txt){toast('Digite algo para analisar',false);return;}
  const r=parseNLP(txt);
  setType(r.type);

  if(r.description) document.getElementById('f-desc').value=r.description;
  document.getElementById('f-cat').value=r.category;
  document.getElementById('f-data').value=r.date;
  document.getElementById('f-conta').value=r.account;
  toast('Analisado! Revise os campos antes de salvar.');
}

// ── VOZ (Safari iOS) ──────────────────────────────────────────────────────────
function initVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('voice-btn').style.opacity='0.3';
    document.getElementById('voice-btn').title='Voz não disponível neste navegador';
  }
}
function toggleVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Voz não disponível. Use Safari ou Chrome.',false);return;}
  if(isListening){if(recognition)recognition.stop();return;}
  // Criar instância DENTRO do handler do clique (obrigatório no Safari iOS)
  recognition=new SR();
  recognition.lang='pt-BR';
  recognition.continuous=false;
  recognition.interimResults=true;
  recognition.maxAlternatives=1;
  recognition.onstart=()=>{
    isListening=true;
    document.getElementById('voice-btn').classList.add('listening');
    document.getElementById('voice-box').classList.add('listening');
    document.getElementById('voice-display').innerHTML='<span style="color:var(--pri)">Ouvindo... fale agora</span>';
  };
  recognition.onresult=e=>{
    let txt='';
    for(let i=e.resultIndex;i<e.results.length;i++) txt+=e.results[i][0].transcript;
    if(txt.trim()){
      document.getElementById('txt-input').value=txt.trim();
      document.getElementById('voice-display').textContent=txt.trim();
    }
  };
  recognition.onend=()=>{
    isListening=false; recognition=null;
    document.getElementById('voice-btn').classList.remove('listening');
    document.getElementById('voice-box').classList.remove('listening');
    const txt=document.getElementById('txt-input').value.trim();
    if(txt){document.getElementById('voice-display').textContent=txt; processNLP();}
    else document.getElementById('voice-display').textContent='Toque no microfone ou preencha abaixo...';
  };
  recognition.onerror=e=>{
    isListening=false; recognition=null;
    document.getElementById('voice-btn').classList.remove('listening');
    document.getElementById('voice-box').classList.remove('listening');
    if(e.error==='not-allowed') toast('Permissão de microfone negada nas configurações do Safari.',false);
    else if(e.error==='no-speech') toast('Nenhuma fala detectada.',false);
    else toast('Erro no microfone: '+e.error,false);
  };
  try{recognition.start();}
  catch(err){toast('Erro ao iniciar microfone: '+err.message,false);recognition=null;}
}

  document.getElementById('f-cat').value='alimentacao';
  document.getElementById('f-conta').value='corrente';
  document.getElementById('f-repeat').value='none';
  document.getElementById('f-repeat-count-wrap').style.display='none';
  setType('despesa');
  document.getElementById('voice-display').textContent='Toque no microfone ou preencha abaixo...';
}

async function addTransaction(){
  const desc=document.getElementById('f-desc').value.trim();
  const valor=parseFloat(document.getElementById('f-valor').value);
  const data=document.getElementById('f-data').value;
  const cat=document.getElementById('f-cat').value;
  const conta=document.getElementById('f-conta').value;
  if(!desc){toast('Informe a descrição',false);return;}
  if(!valor||isNaN(valor)||valor<=0){toast('Informe um valor válido',false);return;}
  if(!data){toast('Informe a data',false);return;}
  const tx={id:uid(),type:curType,amount:valor,description:desc,category:cat,date:data,account:conta,createdAt:Date.now()};
  await dbPut('transactions',tx);
  transactions.push(tx);
  // Repetição
  const repeat=document.getElementById('f-repeat').value;
  const count=parseInt(document.getElementById('f-repeat-count').value)||1;
  if(repeat!=='none'&&count>1){
    let d=new Date(data+'T12:00:00');
    for(let i=1;i<count;i++){
      if(repeat==='weekly') d.setDate(d.getDate()+7);
      else if(repeat==='monthly') d.setMonth(d.getMonth()+1);
      else if(repeat==='yearly') d.setFullYear(d.getFullYear()+1);
      const rtx={id:uid(),type:curType,amount:valor,description:desc,category:cat,date:d.toISOString().split('T')[0],account:conta,createdAt:Date.now()};
      await dbPut('transactions',rtx);
      transactions.push(rtx);
    }
    toast('Lançamento + '+(count-1)+' repetições salvos! ✓');
  } else {
    toast('Lançamento salvo! ✓');
  }
  clearForm(); renderAll();
}

async function deleteTx(id){
  if(!confirm('Remover este lançamento?')) return;
  await dbDelete('transactions',id);
  transactions=transactions.filter(t=>t.id!==id);
  renderAll(); toast('Removido.');
}

// ── ORÇAMENTO ─────────────────────────────────────────────────────────────────
async function saveBudget(){
  const cat=document.getElementById('b-cat').value;
  const val=parseFloat(document.getElementById('b-val').value);
  if(!val||isNaN(val)||val<=0){toast('Informe um valor válido',false);return;}
  const existing=budgets.find(b=>b.id===cat);
  const b={id:cat,category:cat,amount:val};
  await dbPut('budgets',b);
  if(existing) Object.assign(existing,b); else budgets.push(b);
  document.getElementById('b-val').value='';
  renderBudgets(); toast('Orçamento salvo! ✓');
}

// ── RECORRENTES ───────────────────────────────────────────────────────────────
async function addRecurring(){
  const desc=document.getElementById('r-desc').value.trim();
  const valor=parseFloat(document.getElementById('r-valor').value);
  const dia=parseInt(document.getElementById('r-dia').value);
  const cat=document.getElementById('r-cat').value;
  const conta=document.getElementById('r-conta').value;
  const durTipo=document.getElementById('r-duracao').value;
  const durVal=parseInt(document.getElementById('r-duracao-val').value)||0;
  if(!desc){toast('Informe a descrição',false);return;}
  if(!valor||isNaN(valor)||valor<=0){toast('Informe um valor válido',false);return;}
  if(!dia||dia<1||dia>31){toast('Informe um dia válido (1-31)',false);return;}
  if(durTipo!=='forever'&&(!durVal||durVal<1)){toast('Informe a duração',false);return;}
  const r={id:uid(),desc,amount:valor,category:cat,day:dia,account:conta,durType:durTipo,durValue:durVal,timesLaunched:0};
  await dbPut('recurring',r);
  recurring.push(r);
  document.getElementById('r-desc').value='';
  document.getElementById('r-valor').value='';
  document.getElementById('r-dia').value='';
  document.getElementById('r-duracao').value='forever';
  document.getElementById('r-duracao-val-wrap').style.display='none';
  renderRecurring(); toast('Recorrente salva! ✓');
}
async function launchRecurring(id){
  const r=recurring.find(x=>x.id===id);if(!r)return;
  const key=selYear+'-'+selMonth+'-'+r.id;
  const d=new Date(selYear,selMonth,r.day).toISOString().split('T')[0];
  const tx={id:uid(),type:'despesa',amount:r.amount,description:r.desc,category:r.category,date:d,account:r.account,recurringRef:key,createdAt:Date.now()};
  await dbPut('transactions',tx);
  transactions.push(tx);
  r.timesLaunched=(r.timesLaunched||0)+1;
  await dbPut('recurring',r);
  renderRecurring(); renderDashboard(); toast(r.desc+' lançada! ✓');
}
async function deleteRecurring(id){
  if(!confirm('Remover esta recorrente?'))return;
  await dbDelete('recurring',id);
  recurring=recurring.filter(r=>r.id!==id);
  renderRecurring(); toast('Removida.');
}

// ── RENDERS ───────────────────────────────────────────────────────────────────
function monthTxs(){
  return transactions.filter(t=>{
    const d=new Date(t.date+'T12:00:00');
    return d.getFullYear()===selYear&&d.getMonth()===selMonth;
  });
}

function renderDashboard(){
  const txs=monthTxs();
  const rec=txs.filter(t=>t.type==='receita').reduce((s,t)=>s+t.amount,0);
  const desp=txs.filter(t=>t.type==='despesa').reduce((s,t)=>s+t.amount,0);
  const saldo=rec-desp;
  const eco=rec>0?Math.round((saldo/rec)*100):0;
  document.getElementById('kpi-saldo').textContent=fmt(saldo);
  document.getElementById('kpi-saldo').className='kpi-val tabnum '+(saldo>=0?'ok':'err');
  document.getElementById('kpi-rec').textContent=fmt(rec);
  document.getElementById('kpi-desp').textContent=fmt(desp);
  const ecoEl=document.getElementById('kpi-eco');
  ecoEl.textContent=eco+'%';
  ecoEl.className='kpi-val tabnum '+(eco>=20?'ok':eco>=0?'pri':'err');
  // categorias
  const bycat={};
  txs.filter(t=>t.type==='despesa').forEach(t=>bycat[t.category]=(bycat[t.category]||0)+t.amount);
  const sorted=Object.entries(bycat).sort((a,b)=>b[1]-a[1]);
  const catsEl=document.getElementById('dash-cats');
  if(!sorted.length){catsEl.innerHTML='<div class="empty" style="padding:var(--s6)"><span>Nenhum gasto este mês</span></div>';return;}
  catsEl.innerHTML=sorted.map(([cat,val])=>{
    const pct=desp>0?Math.round((val/desp)*100):0;
    return `<div style="margin-bottom:var(--s3)">
      <div class="row-sb" style="margin-bottom:var(--s1)">
        <span style="font-size:var(--sm)">${CAT_EMOJI[cat]||'📦'} ${CAT_LABEL[cat]||cat}</span>
        <span class="tabnum" style="font-size:var(--sm);font-weight:600">${fmt(val)} <span style="color:var(--muted)">${pct}%</span></span>
      </div>
      <div class="budget-bar"><div class="budget-fill" style="width:${pct}%;background:${CAT_COLOR[cat]||'var(--pri)'}"></div></div>
    </div>`;
  }).join('');
  // recentes
  const recent=[...txs].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  document.getElementById('dash-recent').innerHTML=recent.length
    ?recent.map(t=>txCard(t)).join('')
    :'<div class="empty" style="padding:var(--s6)"><span>Nenhum lançamento</span></div>';
}

function txCard(t){
  const d=new Date(t.date+'T12:00:00');
  const dd=d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0');
  return `<div class="tx-item">
    <div class="tx-icon" style="background:${CAT_COLOR[t.category]||'#797876'}22">${CAT_EMOJI[t.category]||'📦'}</div>
    <div class="tx-info">
      <div class="tx-desc">${t.description}</div>
      <div class="tx-meta">${dd} · ${CAT_LABEL[t.category]||t.category} · ${t.account}</div>
    </div>
    <span class="tx-val ${t.type==='receita'?'rec':'desp'}">${t.type==='receita'?'+':'-'}${fmt(t.amount)}</span>
    <button class="del-btn" onclick="deleteTx('${t.id}')" title="Remover">×</button>
  </div>`;
}

function renderLista(){
  const search=(document.getElementById('search-input')?.value||'').toLowerCase();
  const filterCat=document.getElementById('filter-cat')?.value||'';
  let txs=monthTxs();
  if(search) txs=txs.filter(t=>t.description.toLowerCase().includes(search)||t.category.includes(search));
  if(filterCat) txs=txs.filter(t=>t.category===filterCat);
  txs.sort((a,b)=>new Date(b.date)-new Date(a.date));
  const el=document.getElementById('tx-list');
  el.innerHTML=txs.length?txs.map(t=>txCard(t)).join('')
    :'<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg><span>Nenhum lançamento encontrado</span></div>';
}

function renderBudgets(){
  const txs=monthTxs().filter(t=>t.type==='despesa');
  const el=document.getElementById('budget-list');
  if(!budgets.length){el.innerHTML='<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>Nenhum orçamento definido</span></div>';return;}
  el.innerHTML=budgets.map(b=>{
    const gasto=txs.filter(t=>t.category===b.category).reduce((s,t)=>s+t.amount,0);
    const pct=Math.min(Math.round((gasto/b.amount)*100),100);
    const over=gasto>b.amount;
    return `<div class="card" style="margin-bottom:var(--s3)">
      <div class="row-sb">
        <span style="font-weight:600">${CAT_EMOJI[b.category]||'📦'} ${CAT_LABEL[b.category]||b.category}</span>
        <span class="tabnum ${over?'err':''}" style="font-size:var(--sm)">${fmt(gasto)} / ${fmt(b.amount)}</span>
      </div>
      <div class="budget-bar"><div class="budget-fill" style="width:${pct}%;background:${over?'var(--err)':'var(--pri)'}"></div></div>
      ${over?'<span style="font-size:var(--xs);color:var(--err);font-weight:600">⚠ Limite ultrapassado</span>':''}
    </div>`;
  }).join('');
}

function renderRecurring(){
  const el=document.getElementById('rec-list');
  if(!recurring.length){el.innerHTML='<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg><span>Nenhuma recorrente cadastrada</span></div>';return;}
  const sorted=[...recurring].sort((a,b)=>a.day-b.day);
  el.innerHTML=sorted.map(r=>{
    const key=selYear+'-'+selMonth+'-'+r.id;
    const launched=transactions.some(t=>t.recurringRef===key);
    const expired=r.durType!=='forever'&&(r.timesLaunched||0)>=(r.durValue||9999);
    const durLabel=r.durType==='forever'?'Indefinida':r.durType==='months'?`${r.timesLaunched||0}/${r.durValue} meses`:`${r.timesLaunched||0}/${r.durValue}x`;
    return `<div class="rec-row" style="opacity:${expired?.5:1}">
      <span class="rec-day">Dia ${r.day}</span>
      <div class="tx-icon" style="background:${CAT_COLOR[r.category]||'#797876'}22">${CAT_EMOJI[r.category]||'📦'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:var(--sm);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.desc}</div>
        <div style="font-size:var(--xs);color:var(--muted)">${r.account} · ${durLabel}</div>
      </div>
      <span class="tabnum" style="font-weight:700;font-size:var(--sm)">${fmt(r.amount)}</span>
      ${expired?'<span class="badge badge-red">Encerrada</span>':launched?'<span class="badge badge-green">✓</span>':`<button class="btn btn-primary btn-sm" onclick="launchRecurring('${r.id}')">Lançar</button>`}
      <button class="del-btn" onclick="deleteRecurring('${r.id}')" title="Remover">×</button>
    </div>`;
  }).join('');
}

function renderRelatorios(){
  const txs=monthTxs();
  const rec=txs.filter(t=>t.type==='receita').reduce((s,t)=>s+t.amount,0);
  const desp=txs.filter(t=>t.type==='despesa').reduce((s,t)=>s+t.amount,0);
  const saldo=rec-desp;
  document.getElementById('report-summary').innerHTML=`
    <div class="card-title">${MONTHS[selMonth]} ${selYear}</div>
    <div class="row-sb" style="margin-bottom:var(--s2)"><span>Total Receitas</span><span class="tabnum ok fw7">${fmt(rec)}</span></div>
    <div class="row-sb" style="margin-bottom:var(--s2)"><span>Total Despesas</span><span class="tabnum err fw7">${fmt(desp)}</span></div>
    <div style="height:1px;background:var(--div);margin:var(--s3) 0"></div>
    <div class="row-sb"><span class="fw7">Saldo</span><span class="tabnum fw7 ${saldo>=0?'ok':'err'}">${fmt(saldo)}</span></div>`;
  const bycat={};
  txs.filter(t=>t.type==='despesa').forEach(t=>bycat[t.category]=(bycat[t.category]||0)+t.amount);
  const sorted=Object.entries(bycat).sort((a,b)=>b[1]-a[1]);
  document.getElementById('report-cats').innerHTML=sorted.length
    ?sorted.map(([cat,val])=>`<div class="row-sb" style="margin-bottom:var(--s3)"><span>${CAT_EMOJI[cat]||'📦'} ${CAT_LABEL[cat]||cat}</span><span class="tabnum fw7">${fmt(val)}</span></div>`).join('')
    :'<div class="empty" style="padding:var(--s6)"><span>Sem despesas este mês</span></div>';
  renderChart();
}

function renderChart(){
  const labels=[];const recs=[];const desps=[];
  for(let i=5;i>=0;i--){
    let m=selMonth-i; let y=selYear;
    if(m<0){m+=12;y--;}
    labels.push(MONTHS[m].slice(0,3));
    const txs=transactions.filter(t=>{const d=new Date(t.date+'T12:00:00');return d.getFullYear()===y&&d.getMonth()===m;});
    recs.push(txs.filter(t=>t.type==='receita').reduce((s,t)=>s+t.amount,0));
    desps.push(txs.filter(t=>t.type==='despesa').reduce((s,t)=>s+t.amount,0));
  }
  const ctx=document.getElementById('chart-evolucao').getContext('2d');
  if(chartEvolucao) chartEvolucao.destroy();
  chartEvolucao=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[
      {label:'Receitas',data:recs,backgroundColor:'rgba(67,122,34,.7)',borderRadius:4},
      {label:'Despesas',data:desps,backgroundColor:'rgba(161,44,123,.7)',borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:getComputedStyle(document.documentElement).getPropertyValue('--txt').trim()||'#28251d',font:{size:11}}}},scales:{x:{ticks:{color:'var(--muted)'},grid:{display:false}},y:{ticks:{color:'var(--muted)',callback:v=>'R$'+v},grid:{color:'var(--div)'}}}}
  });
}

function renderAll(){
  renderDashboard();
  if(document.getElementById('sub-lista')?.style.display!=='none') renderLista();
  renderBudgets();
  renderRecurring();
}

// ── SPLASH ───────────────────────────────────────────────────────────────────
function hideSplash(){
  const s=document.getElementById('splash');
  if(s){s.classList.add('hide');setTimeout(()=>s.remove(),500);}
}

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init(){
  initTheme();
  await openDB();
  [transactions,recurring,budgets]=await Promise.all([
    dbGetAll('transactions'),dbGetAll('recurring'),dbGetAll('budgets')
  ]);
  initMonth();
  clearForm();
  initVoice();
  renderAll();
  hideSplash();
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
